name: Sync From Profile README

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout publish repository
        uses: actions/checkout@v4

      - name: Download README.md from lingceng/lingceng
        run: |
          set -euo pipefail
          curl -fsSL \
            https://raw.githubusercontent.com/lingceng/lingceng/main/README.md \
            -o index.md

      - name: Commit updated index.md
        run: |
          set -euo pipefail

          if [[ -z "$(git status --short)" ]]; then
            echo "No changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.md
          git commit -m "同步 Profile README 到首页"
          git push
